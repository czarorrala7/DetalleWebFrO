<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Netflix+Sans:wght@300;400;500;700&family=Inter:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;height:100vh;width:100vw;}

/* ══════════════ INTRO CANVAS ══════════════ */
#intro-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:200;}

/* ══════════════ MENÚ PERFILES ══════════════ */
#menu{
  position:fixed;inset:0;z-index:100;
  background:#141414;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:2.5rem;
  opacity:0;pointer-events:none;
  transition:opacity 0.6s ease;
}
#menu.visible{opacity:1;pointer-events:all;}

.nf-logo{
  position:absolute;top:1.2rem;left:1.8rem;
  font-family:'Bebas Neue',sans-serif;
  font-size:2.2rem;letter-spacing:1px;
  color:#E50914;
  text-shadow:0 0 20px rgba(229,9,20,0.3);
  cursor:default;
}

#menu h1{
  font-size:clamp(1.4rem,3.5vw,2.2rem);
  font-weight:500;color:#fff;
  letter-spacing:0.02em;
  margin-bottom:0.5rem;
}

.profiles{
  display:flex;gap:2rem;flex-wrap:wrap;justify-content:center;
}

.profile{
  display:flex;flex-direction:column;align-items:center;gap:0.7rem;
  cursor:pointer;
}
.profile:hover .p-img{border:3px solid #fff;transform:scale(1.05);}
.profile:hover .p-name{color:#fff;}

.p-img{
  width:130px;height:130px;border-radius:6px;
  border:3px solid transparent;
  transition:all 0.2s ease;
  overflow:hidden;
  background:#333;
}
.p-img img{width:100%;height:100%;object-fit:cover;}

.p-name{
  font-size:1rem;font-weight:400;
  color:rgba(255,255,255,0.65);
  transition:color 0.2s;
  letter-spacing:0.05em;
}

/* ══════════ PLAYER SPOTIFY ══════════ */
.spotify-player{
  background:#1a1a1a;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:1rem 1.4rem;
  display:flex;flex-direction:column;
  align-items:center;gap:0.85rem;
  width:min(92vw, 360px);
  position:relative;
}

.sp-top{
  display:flex;align-items:center;gap:1rem;width:100%;
}

.sp-disc{
  width:48px;height:48px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #333, #111);
  border:3px solid #E50914;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  animation:spin 4s linear infinite paused;
  position:relative;overflow:hidden;
}
.sp-disc::after{
  content:'';
  position:absolute;inset:30%;border-radius:50%;
  background:#1a1a1a;
}
.sp-disc.playing{animation-play-state:running;}
.sp-disc svg{position:relative;z-index:2;}

.sp-info{flex:1;min-width:0;}
.sp-note{font-size:10px;color:rgba(255,255,255,0.35);margin-bottom:2px;}
.sp-title{font-size:14px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sp-artist{font-size:12px;color:rgba(255,255,255,0.5);}

.sp-heart{
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,0.4);
  transition:color 0.2s;padding:4px;
}
.sp-heart:hover{color:#E50914;}
.sp-heart.liked{color:#E50914;}

.sp-progress-wrap{width:100%;display:flex;flex-direction:column;gap:5px;}
.sp-bar-bg{
  width:100%;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.15);
  cursor:pointer;position:relative;
}
.sp-bar-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,#E50914,#ff6b6b);
  width:0%;transition:width 0.5s linear;
  position:relative;
}
.sp-bar-fill::after{
  content:'';position:absolute;right:-5px;top:50%;
  transform:translateY(-50%);
  width:10px;height:10px;border-radius:50%;
  background:#fff;opacity:0;transition:opacity 0.2s;
}
.sp-bar-bg:hover .sp-bar-fill::after{opacity:1;}
.sp-times{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.35);}

.sp-controls{display:flex;align-items:center;gap:1.2rem;}
.sp-btn{
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,0.5);
  transition:color 0.2s, transform 0.15s;
  padding:4px;display:flex;align-items:center;justify-content:center;
}
.sp-btn:hover{color:#fff;transform:scale(1.1);}
.sp-play{
  width:44px;height:44px;border-radius:50%;
  background:#E50914;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.15s,background 0.2s;
}
.sp-play:hover{transform:scale(1.08);background:#c4070f;}
.sp-volume{
  display:flex;align-items:center;gap:6px;margin-top:-4px;
}
.sp-vol-bar{
  width:70px;height:3px;border-radius:2px;
  background:rgba(255,255,255,0.2);position:relative;cursor:pointer;
}
.sp-vol-fill{
  height:100%;border-radius:2px;
  background:#fff;width:70%;
}

/* NOTA musical flotante */
.sp-note-icon{
  position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  font-size:13px;color:rgba(255,255,255,0.3);
}

@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
</style>
</head>
<body>

<canvas id="intro-canvas"></canvas>

<div id="menu">
  <div class="nf-logo">NETFLIX</div>
  <h1>¿Quién está viendo ahora?</h1>

  <div class="profiles">
    <!-- PERFIL 1 -->
    <div class="profile" onclick="irASerie()">
      <div class="p-img">
        <!-- Pon aquí tu imagen: <img src="foto1.jpg"> -->
        <!-- Si no tienes imagen, muestra un placeholder de color -->
        <img src="Fotos/Fran/FranCesar.jpeg" alt="Nosotros" onerror="this.parentElement.style.background='#E50914'">
      </div>
      <span class="p-name">Nosotros</span>
    </div>

    <!-- PERFIL 2 -->
    <!-- <div class="profile" onclick="irASerie()">
      <div class="p-img">
        <img src="https://picsum.photos/seed/primerdía/200/200" alt="1er Dia" onerror="this.parentElement.style.background='#333'">
      </div>
      <span class="p-name">1er Día</span>
    </div>
  </div>-->

  <!-- PLAYER SPOTIFY -->
  <div class="spotify-player">
    <span class="sp-note-icon">♪</span>

    <div class="sp-top">
      <div class="sp-disc" id="spDisc">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
      </div>
      <div class="sp-info">
        <div class="sp-note">♪ Reproduciendo</div>
        <div class="sp-title" id="spTitle">Ed Sheeran - Perfect</div>
        <div class="sp-artist" id="spArtist">Ed Sheeran • Perfect</div>
      </div>
      <button class="sp-heart" id="spHeart" onclick="toggleLike(this)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </button>
    </div>

    <div class="sp-progress-wrap">
      <div class="sp-bar-bg" onclick="seekAudio(event, this)">
        <div class="sp-bar-fill" id="spFill"></div>
      </div>
      <div class="sp-times">
        <span id="spCurrent">0:00</span>
        <span id="spDuration">0:00</span>
      </div>
    </div>

    <div class="sp-controls">
      <button class="sp-btn" onclick="skipBack()" title="Anterior">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="sp-play" id="spPlayBtn" onclick="togglePlay()">
        <svg id="spPlayIcon" width="20" height="20" viewBox="0 0 24 24" fill="white">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button class="sp-btn" onclick="skipFwd()" title="Siguiente">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
      <div class="sp-volume">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="rgba(255,255,255,0.4)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <div class="sp-vol-bar" onclick="setVolume(event,this)">
          <div class="sp-vol-fill" id="spVolFill"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="audioPlayer" crossorigin="anonymous">
  <!-- Cambia esta URL por la de tu canción -->
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
// ══════════════════════════════════════════
//   INTRO NETFLIX — secuencia fiel
// ══════════════════════════════════════════
const ic  = document.getElementById('intro-canvas');
const ctx = ic.getContext('2d');
ic.width  = window.innerWidth;
ic.height = window.innerHeight;
const CW=ic.width,CH=ic.height,CX=CW/2,CY=CH/2;

const easeOut  = t=>1-Math.pow(1-t,3);
const easeIO   = t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const easeIn   = t=>t*t*t;
const SPECTRUM = ['#E50914','#E8270F','#EB3A0A','#EE4E06','#F47800','#F4B400','#A8CC00','#4CAF50','#00BCD4','#2196F3','#3F51B5','#7C4DFF','#E040FB','#E91E63','#F44336'];
const N_STRIPS = 16;

function hexRGB(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}

function drawNetflixN(alpha,scaleY,colorBlend,spread){
  const h=Math.min(CW,CH)*0.50, w=h*0.60, th=h*0.15;
  ctx.save();
  ctx.globalAlpha=Math.max(0,Math.min(1,alpha));
  ctx.translate(CX,CY);
  ctx.scale(1,scaleY);

  for(let i=0;i<N_STRIPS;i++){
    const frac=i/(N_STRIPS-1);
    const xBase=-w/2+i*(w/N_STRIPS);
    const sw=w/N_STRIPS+0.5;
    const c=SPECTRUM[Math.floor(frac*(SPECTRUM.length-1))];
    const {r:sr,g:sg,b:sb}=hexRGB(c);
    const r=Math.round(229+(sr-229)*colorBlend);
    const g=Math.round(9+(sg-9)*colorBlend);
    const b=Math.round(20+(sb-20)*colorBlend);
    const spreadX=(frac-0.5)*CW*spread;

    ctx.save();
    ctx.translate(spreadX,0);

    if(spread<0.02){
      ctx.beginPath();
      ctx.rect(-w/2,-h/2,th,h);
      ctx.rect(w/2-th,-h/2,th,h);
      ctx.moveTo(-w/2+th,-h/2);ctx.lineTo(w/2,-h/2);
      ctx.lineTo(w/2-th,-h/2+th*.5);ctx.lineTo(-w/2+th,h/2-th*.5);
      ctx.lineTo(-w/2,h/2);ctx.lineTo(-w/2+th,h/2-th*.5);
      ctx.lineTo(w/2-th,-h/2+th*.5);ctx.lineTo(w/2,-h/2);
      ctx.closePath();ctx.clip();
    }

    const grd=ctx.createLinearGradient(0,-h/2,0,h/2);
    grd.addColorStop(0,`rgba(${r},${g},${b},0.55)`);
    grd.addColorStop(0.28,`rgba(${r},${g},${b},1)`);
    grd.addColorStop(0.5,`rgba(${Math.min(255,r+55)},${Math.min(255,g+15)},${Math.min(255,b+15)},1)`);
    grd.addColorStop(0.72,`rgba(${r},${g},${b},1)`);
    grd.addColorStop(1,`rgba(${r},${g},${b},0.45)`);
    ctx.fillStyle=grd;
    ctx.fillRect(xBase,-h/2,sw,h);
    ctx.restore();
  }

  // Sombra 3D encima cuando es la N roja sólida
  if(spread<0.02){
    ctx.save();
    ctx.beginPath();
    ctx.rect(-w/2,-h/2,th,h);ctx.rect(w/2-th,-h/2,th,h);
    ctx.moveTo(-w/2+th,-h/2);ctx.lineTo(w/2,-h/2);
    ctx.lineTo(w/2-th,-h/2+th*.5);ctx.lineTo(-w/2+th,h/2-th*.5);
    ctx.lineTo(-w/2,h/2);ctx.lineTo(-w/2+th,h/2-th*.5);
    ctx.lineTo(w/2-th,-h/2+th*.5);ctx.lineTo(w/2,-h/2);
    ctx.closePath();ctx.clip();
    const sh=ctx.createLinearGradient(-w/2,-h/2,w/3,h/2);
    sh.addColorStop(0,'rgba(0,0,0,0.5)');sh.addColorStop(0.35,'rgba(0,0,0,0)');sh.addColorStop(1,'rgba(0,0,0,0.2)');
    ctx.fillStyle=sh;ctx.fillRect(-w/2,-h/2,w,h);
    ctx.restore();
  }

  // Glow rojo
  const grd2=ctx.createRadialGradient(0,0,0,0,0,h*0.9);
  grd2.addColorStop(0,`rgba(229,9,20,${0.4*colorBlend<0.4?0.4-colorBlend*0.35:0.05})`);
  grd2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.save();ctx.globalAlpha=alpha*0.5;ctx.fillStyle=grd2;ctx.fillRect(-h,-h,h*2,h*2);ctx.restore();

  ctx.restore();
}

function drawSweep(prog){
  const count=SPECTRUM.length, lw=CW/count*2.6, travel=CW*1.7, startX=-lw*count;
  ctx.save();
  for(let i=0;i<count;i++){
    const x=startX+i*(CW/count)*1.15+travel*prog;
    if(x>CW+lw||x+lw<0)continue;
    const c=SPECTRUM[i],{r,g,b}=hexRGB(c);
    const grd=ctx.createLinearGradient(x,0,x+lw,0);
    grd.addColorStop(0,`rgba(${r},${g},${b},0)`);
    grd.addColorStop(0.25,`rgba(${r},${g},${b},0.9)`);
    grd.addColorStop(0.75,`rgba(${r},${g},${b},0.9)`);
    grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.fillStyle=grd;ctx.fillRect(x,0,lw,CH);
  }
  ctx.restore();
}

function drawText(alpha){
  const sz=Math.min(CW*0.13,CH*0.17);
  ctx.save();ctx.globalAlpha=Math.max(0,alpha);
  ctx.font=`900 ${sz}px 'Bebas Neue',Impact,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#E50914';ctx.fillText('NETFLIX',CX,CY);
  ctx.restore();
}

const T={BLACK:350,N_IN:1000,N_HOLD:1700,EXPAND:2400,SWEEP:3050,DISSOLVE:3600,HOLD:4150,FADEOUT:4650};
let t0=null;
function introFrame(ts){
  if(!t0)t0=ts; const t=ts-t0;
  ctx.clearRect(0,0,CW,CH);ctx.fillStyle='#000';ctx.fillRect(0,0,CW,CH);

  if(t<T.BLACK){/* negro */}
  else if(t<T.N_IN){
    const p=(t-T.BLACK)/(T.N_IN-T.BLACK);
    drawNetflixN(easeOut(p),0.88+easeOut(p)*0.12,0,0);
  }
  else if(t<T.N_HOLD){
    drawNetflixN(1,1,0,0);
  }
  else if(t<T.EXPAND){
    const p=(t-T.N_HOLD)/(T.EXPAND-T.N_HOLD);
    drawNetflixN(1-easeIn(p)*0.25,1,easeOut(p),easeIn(p)*1.1);
  }
  else if(t<T.SWEEP){
    const p=(t-T.EXPAND)/(T.SWEEP-T.EXPAND);
    drawSweep(easeIO(p));
  }
  else if(t<T.DISSOLVE){
    const p=(t-T.SWEEP)/(T.DISSOLVE-T.SWEEP);
    ctx.save();ctx.globalAlpha=1-easeOut(p);drawSweep(1.05);ctx.restore();
    drawText(easeOut(p));
  }
  else if(t<T.HOLD){
    drawText(1);
  }
  else if(t<T.FADEOUT){
    const p=(t-T.HOLD)/(T.FADEOUT-T.HOLD);
    ctx.save();ctx.globalAlpha=1-easeOut(p);drawText(1);ctx.restore();
    ctx.fillStyle=`rgba(0,0,0,${easeOut(p)})`;ctx.fillRect(0,0,CW,CH);
  }

  if(t<T.FADEOUT+100){requestAnimationFrame(introFrame);}
  else{ic.style.display='none';document.getElementById('menu').classList.add('visible');}
}
requestAnimationFrame(introFrame);

// ══════════════════════════════════════════
//   PLAYER SPOTIFY
// ══════════════════════════════════════════
const audio  = document.getElementById('audioPlayer');
const fill   = document.getElementById('spFill');
const curr   = document.getElementById('spCurrent');
const dur    = document.getElementById('spDuration');
const disc   = document.getElementById('spDisc');
const pIcon  = document.getElementById('spPlayIcon');
let isPlaying=false;

function fmt(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${sec.toString().padStart(2,'0')}`;}

audio.addEventListener('loadedmetadata',()=>{dur.textContent=fmt(audio.duration);});
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration)return;
  const p=(audio.currentTime/audio.duration)*100;
  fill.style.width=p+'%';
  curr.textContent=fmt(audio.currentTime);
});
audio.addEventListener('ended',()=>{ isPlaying=false; setPlayIcon(false); disc.classList.remove('playing'); });

function setPlayIcon(playing){
  pIcon.innerHTML=playing
    ?'<rect x="6" y="4" width="4" height="16" fill="white"/><rect x="14" y="4" width="4" height="16" fill="white"/>'
    :'<path d="M8 5v14l11-7z" fill="white"/>';
}

function togglePlay(){
  if(isPlaying){audio.pause();isPlaying=false;disc.classList.remove('playing');}
  else{audio.play().catch(()=>{});isPlaying=true;disc.classList.add('playing');}
  setPlayIcon(isPlaying);
}

function seekAudio(e,bar){
  const rect=bar.getBoundingClientRect();
  const p=(e.clientX-rect.left)/rect.width;
  audio.currentTime=p*audio.duration;
}

function setVolume(e,bar){
  const rect=bar.getBoundingClientRect();
  const p=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  audio.volume=p;
  document.getElementById('spVolFill').style.width=(p*100)+'%';
}

function skipFwd(){audio.currentTime=Math.min(audio.duration,audio.currentTime+10);}
function skipBack(){audio.currentTime=Math.max(0,audio.currentTime-10);}
function toggleLike(btn){btn.classList.toggle('liked');}
function irASerie(){window.location.href='serie.html';}
</script>
</body>
</html>
